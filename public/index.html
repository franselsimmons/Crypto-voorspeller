<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Forest BTC</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="top">
    <div class="row">
      <div class="pill" id="statusPill">Loading…</div>
      <div id="meta" class="meta"></div>
    </div>

    <div class="controls">
      <div class="group">
        <div class="label">TF:</div>
        <button class="btn" data-tf="1d" id="btnTF1D">1D</button>
        <button class="btn" data-tf="1w" id="btnTF1W">1W</button>
      </div>

      <div class="group">
        <div class="label">Horizon:</div>
        <button class="btn" data-h="30">30</button>
        <button class="btn" data-h="60">60</button>
        <button class="btn" data-h="90">90</button>
        <button class="btn" data-h="180">180</button>
      </div>
    </div>

    <div class="bigChance" id="bigChance"></div>
  </div>

  <div class="wrap">
    <div class="panel">
      <div class="panelTitle">Price + Forest overlay</div>
      <div id="priceChart" class="chart"></div>
    </div>

    <div class="panel">
      <div class="panelTitle">Forest (z-score)</div>
      <div id="forestChart" class="chart small"></div>
    </div>

    <pre id="debug"></pre>
  </div>

  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <script src="/app.js"></script>
</body>
</html>
