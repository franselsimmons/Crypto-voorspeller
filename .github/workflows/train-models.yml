name: Train models and commit

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm ci || npm install

      - name: Train
        run: npm run train

      - name: Ensure models exist
        run: |
          ls -la models || exit 1
          test -f models/rf_bull.json || exit 1
          test -f models/rf_bear.json || exit 1

      - name: Commit models
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/*.json
          git commit -m "Add trained models" || echo "No changes"
          git push