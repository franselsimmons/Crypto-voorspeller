name: Backtest and commit

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # 🔥 BELANGRIJK: geen npm ci maar npm install
      - name: Install dependencies
        run: npm install

      - name: Run backtest
        run: npm run backtest:json

      - name: Commit backtest.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/backtest.json
          git diff --cached --quiet || git commit -m "Update backtest.json"
          git push